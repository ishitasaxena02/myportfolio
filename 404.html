<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Ishita Saxena</title>
    <link rel="icon" href="assets/images/profile.jpg" type="image/jpeg">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 2;
            padding: 2rem;
        }

        .glitch-404 {
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 900;
            font-family: 'JetBrains Mono', monospace;
            color: #00ffff;
            position: relative;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            animation: flicker 3s infinite;
        }

        .glitch-404::before,
        .glitch-404::after {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch-404::before {
            color: #ff0080;
            animation: glitch-shift 2s infinite;
            clip-path: inset(0 0 60% 0);
        }

        .glitch-404::after {
            color: #00ff41;
            animation: glitch-shift-2 2.5s infinite;
            clip-path: inset(60% 0 0 0);
        }

        @keyframes glitch-shift {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-4px, 2px); }
            94% { transform: translate(4px, -2px); }
            96% { transform: translate(-2px, -1px); }
            98% { transform: translate(2px, 1px); }
        }

        @keyframes glitch-shift-2 {
            0%, 88%, 100% { transform: translate(0); }
            90% { transform: translate(3px, -2px); }
            93% { transform: translate(-3px, 2px); }
            96% { transform: translate(2px, 1px); }
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: 0.8; }
            94% { opacity: 1; }
            96% { opacity: 0.9; }
            97% { opacity: 1; }
        }

        .terminal-box {
            background: rgba(20, 20, 30, 0.95);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 12px;
            padding: 2rem;
            margin: 2rem auto;
            max-width: 500px;
            font-family: 'JetBrains Mono', monospace;
            text-align: left;
            backdrop-filter: blur(10px);
        }

        .terminal-line {
            margin-bottom: 0.6rem;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .prompt { color: #00ffff; font-weight: 700; }
        .error { color: #ff5f56; }
        .comment { color: rgba(255, 255, 255, 0.4); }
        .path { color: #ff0080; }

        .message {
            margin-top: 1.5rem;
        }

        .message h3 {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 0.5rem;
        }

        .message p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            margin-top: 2rem;
            padding: 0.8rem 1.8rem;
            background: rgba(0, 255, 255, 0.08);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            color: #00ffff;
            text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(0, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(0, 255, 255, 0.08);
            z-index: 1;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100vh; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="scanline"></div>

    <div class="container">
        <div class="glitch-404">404</div>

        <div class="terminal-box">
            <div class="terminal-line">
                <span class="prompt">$</span> cd <span class="path">/requested-page</span>
            </div>
            <div class="terminal-line">
                <span class="error">Error: ENOENT — no such file or directory</span>
            </div>
            <div class="terminal-line">
                <span class="comment">// the page you're looking for doesn't exist</span>
            </div>
        </div>

        <div class="message">
            <h3>Looks like you're lost in the matrix</h3>
            <p>This route doesn't resolve. Let's get you back on track.</p>
        </div>

        <a href="/" class="back-btn">
            <span>&larr;</span>
            <span>cd /home</span>
        </a>
    </div>
</body>
</html>
